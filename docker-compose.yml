version: '3.8'

services:
  renamebot:
    build: .
    container_name: renamebot
    restart: unless-stopped
    environment:
      # 必填：Bot Token（从 @BotFather 获取）
      - BOT_TOKEN=${BOT_TOKEN}
      # 可选：API ID 和 Hash（如果不提供，机器人将使用默认值）
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
      # 会话文件存储目录（容器内路径）
      - SESSION_DIR=/app/data
      - TZ=Asia/Shanghai
    volumes:
      # 持久化会话文件，避免重新登录
      - ./data:/app/data
    # 可选：资源限制
    # deploy:
    #   resources:
    #     limits:
    #       memory: 512M
    stdin_open: true
    tty: true
